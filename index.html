<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1
        id="header"
        class="bg-primary p-3 text-white d-flex align-content-center justify-content-center"
      >
        Buscá y agregá a tus personajes favoritos
      </h1>
    </header>
    <main class="container">
      <div class="d-flex justify-content-center">
        <form class="d-flex gap-3 w-75" id="formBuscar">
          <input
            type="text"
            id="inputBuscar"
            placeholder="Buscar personaje"
            class="form-control"
          />
          <button type="submit" class="btn btn-primary btn-buscar">
            Buscar
          </button>
        </form>
      </div>
      <div class="row mt-4" id="cardContainer"></div>

      <h2
        id="agregarpersonaje"
        class="text-bg-primary p-2 text-center mt-5 w-50"
      >
        ¡Agrega a tu personaje favorito aquí!
      </h2>
      <div class="w-75">
        <form id="formAgregar">
          <label for="nombrePersonaje">Ingrese el nombre del personaje</label>
          <input
            type="text"
            name=""
            id="nombrePersonaje"
            placeholder="Batman"
            class="form-control"
          />
          <label for="url">Ingrese la URL de la imagen</label>
          <input
            type="text"
            name=""
            id="url"
            placeholder="https://......."
            class="form-control"
          />
          <button type="submit" class="btn btn-outline-primary mt-3 mb-3">
            Agregar
          </button>
        </form>
      </div>
    </main>
    <footer>
      <h3 class="bg-primary p-2 text-white fs-5 text-center">
        &copy;Todos los derechos reservados
      </h3>
    </footer>
    <script src="assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
